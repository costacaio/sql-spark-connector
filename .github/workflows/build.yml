name: Build JAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -Pspark40 -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: spark-mssql-connector-jar
          path: target/*.jar
